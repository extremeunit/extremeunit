<!DOCTYPE html>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Oxanium',sans-serif;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

.header{
position:flex;
top:20;
left:10;
width:100%;
padding:30px 50px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.8);
backdrop-filter:black(10px);
z-index:1000;
}

.logo{
    width: 400px;
    height: 35px;

    background-image: url('https://example.com/logo.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    background-color: #ff0000;
}

.hero{
height:30vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.8)),
url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhSgw4YwndgFePo7UpDiAOqqBArwCvNFR2VgmNwL-oppnVJVUsTC_PaDaKIXmvIPcqkhOFSEvj6p19DDSRQNtVk0uCIhqayLobrcAqqAy_CCR5lFw17rkNZxG-qIO2uQh0QUdpIwmI8SHXBfr0ByyUtsc8t527JyxmgDs7SYYGUPXtbEQqOfYDwUp6oQAY/s1920/198042.png') center/cover;
}

.hero h1{
font-size:20px;
margin-bottom:15px;
color:#fff;
}

.hero span{
color:#ff0000;
}

.hero p{
font-size:10px;
color:#ccc;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:14px 28px;
background:#ff0000;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:500;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
background:#d40000;
}

section{
padding:90px 40px;
}

.title{
font-size:20px;
margin-bottom:40px;
text-align:center;
color:#ff0000;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#111;
padding:25px;
border:1px solid #222;
border-radius:10px;
transition:.3s;
}
.card-link{
    text-decoration: none;
    color: inherit;
}

.card{
    padding: 20px;
    border-radius: 10px;
    background: #222;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover{
    transform: scale(1.03);
}

.card:hover{
transform:translateY(-8px);
border-color:#ff0000;
}

.card h3{
margin-bottom:12px;
color:white;
}

.card p{
color:#aaa;
font-size:14px;
line-height:1.6;
}

.footer{
text-align:center;
padding:30px;
background:#050505;
color:#777;
}

@media(max-width:768px){
.hero h1{
font-size:20px;
}

nav{
display:none;
}
}
</style>

<div class="cards">

<a href="https://extremeunit.github.io/list-competitive-player/" class="card-link">
  <div class="card">

  </div>
</a>

  </div>

<a href="https://www.tiktok.com/@extremeunitclan" class="card-link">
  <div class="card">
    </h3>Offical Tiktok Extreme Unit</h3>
    <p>Follow Untuk Postingan Terbaru</p>
  </div>
</a>

</div>
</section>

<div class="footer">

</div>
